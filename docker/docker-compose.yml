name: pubky-nexus

services:
  neo4j:
    # Locally-built neo4j with the GDS plugin baked in (see neo4j/Dockerfile);
    # `docker compose up` builds it on first use, CI pre-builds it with a
    # GitHub Actions layer cache.
    build: ./neo4j
    image: pubky-nexus/neo4j:5.26.27-gds2.13.10
    container_name: neo4j
    restart: unless-stopped
    ports:
      - 127.0.0.1:7474:7474
      - 127.0.0.1:7687:7687
    volumes:
      # Mount the neo4j configuration file to container
      - .database/neo4j/conf:/conf:Z
      # Mount the data to container
      - .database/neo4j/data:/data:Z
      - .database/neo4j/logs:/logs:Z
      - ./test-graph:/test-graph:Z
    environment:
      NEO4J_initial_dbms_default__database: ${NEO4J_DB_NAME}
      # IMPORTANT: If you change the auth params and you have already created the config files, will not take effect
      # To restart: docker compose down -v
      NEO4J_AUTH: ${NEO4J_DB_USERNAME}/${NEO4J_PASSWORD}
      # https://neo4j.com/docs/operations-manual/current/docker/configuration/
      # Modify the default configuration
      # Raise memory limits.
      # GDS projection lives in heap.
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 2G
      # Disable telemetry (server-side)
      # https://neo4j.com/docs/operations-manual/current/configuration/configuration-settings/#config_dbms.usage_report.enabled
      NEO4J_dbms_usage__report_enabled: false
      # Disable telemetry (client-side)
      # https://neo4j.com/docs/operations-manual/current/configuration/configuration-settings/#config_client.allow_telemetry
      NEO4J_client_allow__telemetry: false
      # NEO4J_apoc_uuid_enabled: false
      # Graph Data Science plugin (free on Community Edition), used to compute
      # seeded PageRank trust scores over the follow graph.
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*
      NEO4J_dbms_security_procedures_allowlist: gds.graph.project,gds.graph.project.estimate,gds.graph.drop,gds.graph.list,gds.pageRank.write
  redis:
    image: redis:8.0.6-alpine
    container_name: redis
    ports:
      - 127.0.0.1:6379:6379
    networks:
      - default
    volumes:
      - .database/redis/data:/data:Z
    restart: always
  redisinsight:
    image: redis/redisinsight:3.0.3
    container_name: redisinsight
    ports:
      - 127.0.0.1:5540:5540
    networks:
      - default
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
    depends_on:
      - redis
    restart: always
  # Only used for tests that involve homeservers (requires --profile tests)
  postgres:
    profiles: ["tests"]
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
    name: pubky-nexus