public_ip = "127.0.0.1"
public_addr = "127.0.0.1:8081"
pubky_listen_socket = "127.0.0.1:8082"

[stack]
# Logging, options: error, warn, info, debug and trace
log_level = "debug"
files_path = "./examples/static/files"
[stack.otlp]
# Service name used for tracing, logging, and metrics in OpenTelemetry
name = "nexus.example.api"
# OTLP endpoint is not set by default. If you want to enable tracing, set it to the OpenTelemetry Collector endpoint
#endpoint = "http://localhost:4317"

[stack.db]
redis = "redis://127.0.0.1:6379"

[stack.db.neo4j]
uri = "bolt://localhost:7687"
# Not needed in the Community Edition
#user = "neo4j"
password = "12345678"
# Queries taking longer than this (ms) will be logged as warnings. Remove or comment out this line to disable.
slow_query_logging_threshold_ms = 100
# Include the full cypher (with interpolated params) in slow-query warnings
#slow_query_logging_include_cypher = false
