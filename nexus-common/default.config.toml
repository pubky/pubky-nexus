[api]
# The public IP address where the Nexus API endpoint can be reached from the outside
public_ip = "127.0.0.1"
# The local IP and port to which the HTTP server will bind and listen on
# This HTTP endpoint can be used for the ICANN DNS-based TLS setup, for example via a reverse proxy
public_addr = "127.0.0.1:8080"
# The local IP and port to which the HTTPS (Pkarr TLS) server will bind and listen on
pubky_listen_socket = "127.0.0.1:8081"
# Time (in seconds) before a request is aborted with a 408 Request Timeout; values below 1 are clamped to 1
request_timeout_secs = 30
# Maximum size (in bytes) accepted for a request body
max_body_size_bytes = 1048576

[api.rate_limit]
# Enable rate limiting (disabled by default for permissiveness behind NATs)
enabled = false
# Trust forwarded-IP headers (X-Forwarded-For / X-Real-IP) for real-IP extraction.
# Only enable behind a known reverse proxy — clients can spoof these headers otherwise.
# trust_proxy_headers = false
# Default bucket for standard endpoints (300 req/min, burst 50)
[api.rate_limit.default_bucket]
rate = 300
burst = 50
# Expensive bucket for high-cost endpoints (20 req/min, burst 5)
[api.rate_limit.expensive_bucket]
rate = 20
burst = 5

[watcher]
# Synonym homeserver pubky
homeserver = "8um71us3fyw6h8wbcxb5ar3rwusy1a6u49956ikzojg3gcwd1dty"
# Maximum number of events to fetch per run from the primary homeserver (max: 1000)
events_limit = 50
# Maximum events per user per run for key-based (third-party) homeservers (max: 100)
key_based_events_limit = 50
# Maximum number of monitored external homeservers.
monitored_homeservers_limit = 50
primary_hs_monitoring_interval_ms = 5000
external_hs_monitoring_interval_ms = 5000
hs_resolver_interval_ms = 10000
# Minimum time (ms) before a user's homeserver mapping is considered stale and therefore eligible to be re-resolved (default: 1 hour)
hs_resolver_ttl = 3600000
# Initial backoff duration (in seconds) after the first failure of a homeserver
initial_backoff_secs = 60
# Maximum backoff duration (in seconds) for a failing homeserver
max_backoff_secs = 3600
retry_processor_interval_ms = 10000
# Maximum allowed file size (in bytes) for ingested files. Default: 52428800 (50 MiB).
# Responses with Content-Length exceeding this are rejected immediately.
# Responses without a header are streamed with a running byte-count and aborted past the cap.
# Rejected files are treated as permanent failures (not retried).
max_file_size = 52428800
# User public key to trust for moderating content (test user key, change as needed)
moderation_id = "uo7jgkykft4885n8cruizwy6khw71mnu5pq3ay9i8pw1ymcn85ko"
# Tags on content to de-index when placed by the trusted moderator above
moderated_tags = [
    "hatespeech",
    "harassement",
    "terrorism",
    "violence",
    "illegal_activities",
    "il_adult_nu_sex_act",
]

# Event retry configuration
[watcher.retry]
# Transient error retry limit before dead-letter
max_retries = 10
# Safety net for homeservers that disappear silently
max_dependency_retries = 50
# Base for exponential backoff on transient retries (seconds)
initial_backoff_secs = 10
# Backoff ceiling for transient retries (seconds)
max_backoff_secs = 3600
# Base for MissingDependency polling backoff (seconds)
initial_missing_dep_backoff_secs = 60
# Backoff ceiling for MissingDependency (seconds)
max_missing_dep_backoff_secs = 3600

[stack]
# Logging, options: error, warn, info, debug and trace
log_level = "info"
files_path = "~/.pubky-nexus/static/files"

[stack.net]
testnet = false
# testnet host, leave as "localhost" for local development. Change only if the
# testnet homeserver/relay are on another machine (e.g. Docker setups).
testnet_host = "localhost"
# External HS PKs which are forbidden from being indexed
external_hs_pk_blacklist = []

[stack.otlp]
# Service name used for tracing, logging, and metrics in OpenTelemetry
name = "nexusd"
# OTLP endpoint is not set by default. If you want to enable tracing, set it to the OpenTelemetry Collector endpoint
#endpoint = "http://localhost:4317"

[stack.db]
redis = "redis://127.0.0.1:6379"
# Maximum time (ms) RediSearch spends on a single FT.SEARCH before returning partial results
#ft_search_timeout_ms = 50

[stack.db.neo4j]
uri = "bolt://localhost:7687"
# Not needed in the Community Edition the profile username, just the password
#user = "neo4j"
password = "12345678"
# Queries taking longer than this (ms) will be logged as warnings. Remove or comment out this line to disable.
slow_query_logging_threshold_ms = 100
# Include the Cypher query text in slow query log entries
#slow_query_logging_include_cypher = false

# Cron scheduling, one section per registered job (see `nexusd jobs list`),
# keyed by job name: `[jobs.<name>]`.
#
# `cron` is SECONDS-FIRST, not the standard 5-field crontab — always include the
# seconds field: sec min hour day-of-month month day-of-week [year]
#
# No enable flag: an absent `cron` (or section) leaves the job unscheduled, but
# still runnable on demand with `nexusd jobs run <name>`.
#[jobs.example]
#cron = "0 0 3 * * *"    # daily at 03:00 UTC
#cron = "0 0 4 * * MON"  # Mondays at 04:00 UTC

# Scheduling for the trust-rank recompute job. Set a cron for automatic
# recomputes; omit it to leave the job on-demand only (`nexusd jobs run
# trust-recompute` always works).
[jobs.trust-recompute]
# Example: daily at 03:00:
#cron = "0 0 3 * * *"

# Trust-rank parameters (what the recompute does; when it runs is set under
# [jobs.trust-recompute] above).
[trust_rank]
# Seeds for the personalized PageRank over the follow graph, each weighted
# equally (v = 1/N). Empty by default: the job refuses to run until set.
# Duplicate ids are silently deduplicated, keeping first-occurrence order. Example:
# seed = ["8um71us3fyw6h8wbcxb5ar3rwusy1a6u49956ikzojg3gcwd1dty"]
seed = []
# Teleport weight `alpha` in `trust = alpha*v + (1-alpha)*M*trust` (GDS dampingFactor = 1-alpha)
alpha = 0.35
# Cap on power-iteration rounds
max_iterations = 200
# Convergence tolerance; kept low to run to convergence rather than early-stop
tolerance = 0.0000001
# When true, each recompute also writes a CSV report of the run to report_dir
report_enabled = false
# Directory recompute reports are written to, created if missing.
# Files are named trust-report-<UTC timestamp>.csv
report_dir = "~/.pubky-nexus/trust-reports"
# Max rows in a report (top users by score).
report_limit = 10000
